server {
    server_name jaywee92.de;

    location = /web-dev-guide/index.html {
        alias /home/jaywee92/web-dev-guide/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location /web-dev-guide/assets/ {
        alias /home/jaywee92/web-dev-guide/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /web-dev-guide/ {
        alias /home/jaywee92/web-dev-guide/dist/;
        index index.html;
        try_files $uri $uri/ /web-dev-guide/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location = /back-dev-guide/index.html {
        alias /home/jaywee92/back-dev-guide/dist/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        expires -1;
    }

    location /back-dev-guide/assets/ {
        alias /home/jaywee92/back-dev-guide/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location /back-dev-guide/ {
        alias /home/jaywee92/back-dev-guide/dist/;
        index index.html;
        try_files $uri $uri/ /back-dev-guide/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        expires -1;
    }

    location /pcep/ {
        alias /home/jaywee92/pcep-prep-meal/;
        index index.html;
        try_files $uri $uri/ /pcep/index.html;
    }

    location /pokeattack {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jaywee92.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaywee92.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Canonical host: redirect www -> apex so the whole OAuth flow (PKCE/state cookies,
# which are bound to the exact host via __Host-/__Secure- prefixes) stays on
# jaywee92.de, matching AUTH_URL and the Google-registered callback URL.
server {
    server_name www.jaywee92.de;
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jaywee92.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jaywee92.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://jaywee92.de$request_uri;
}

server {
    server_name jaywee92.de www.jaywee92.de;
    listen 80;
    return 301 https://jaywee92.de$request_uri;
}
